const SEM_SHEET = { '2-1':'2학년_1학기', '2-2':'2학년_2학기', '3-1':'3학년_1학기', '3-2':'3학년_2학기' };
const SHEET_SEM = Object.fromEntries(Object.entries(SEM_SHEET).map(([k,v])=>[v,k]));
const HEADER = ['과목명','단위수','교과영역','그룹코드','그룹이름','최대선택수'];
const CAT_HINT = '기초 / 탐구 / 생활교양 / 예체능 중 택1';
const GRP_HINT = 'group1 / group2 / group3 / group4 / joint 중 택1';

/** 현재 schoolData → Excel Blob 생성 */
function buildExcel(schoolData) {
    const wb = XLSX.utils.book_new();

    /* 학교정보 시트 */
    const wsInfo = XLSX.utils.aoa_to_sheet([
        ['설정항목','값','설명'],
        ['학교명', schoolData.schoolName, '학교 이름을 입력하세요'],
    ]);
    wsInfo['!cols'] = [{wch:14},{wch:24},{wch:40}];
    XLSX.utils.book_append_sheet(wb, wsInfo, '학교정보');

    /* 작성 안내 시트 */
    const wsGuide = XLSX.utils.aoa_to_sheet([
        ['📌 엑셀 작성 방법'],
        [''],
        ['1. 학교정보 시트에 학교명을 입력하세요.'],
        ['2. 각 학기 시트(2학년_1학기 ~ 3학년_2학기)에 과목을 입력하세요.'],
        ['3. 열 설명:'],
        ['  - 과목명    : 과목 이름 (예: 물리학, 기하)'],
        ['  - 단위수    : 이수 단위 수 (예: 2 또는 3)'],
        ['  - 교과영역  : ' + CAT_HINT],
        ['  - 그룹코드  : ' + GRP_HINT],
        ['  - 그룹이름  : 화면에 표시할 그룹 이름 (예: 그룹1, 공동교육과정)'],
        ['  - 최대선택수: 해당 그룹에서 최대 선택 가능 과목 수 (제한 없으면 999)'],
        [''],
        ['※ 같은 그룹코드는 반드시 같은 그룹이름·최대선택수를 사용하세요.'],
        ['※ 행을 추가/삭제해도 됩니다. 빈 과목명 행은 무시됩니다.'],
    ]);
    wsGuide['!cols'] = [{wch:80}];
    XLSX.utils.book_append_sheet(wb, wsGuide, '📌작성안내');

    /* 각 학기 시트 */
    Object.entries(SEM_SHEET).forEach(([semKey, sheetName]) => {
        const subs   = schoolData.subjects[semKey] || [];
        const limits = schoolData.groupLimits[semKey] || {};
        const rows   = [HEADER, ['(예시) 물리학', 3, '탐구', 'group1', '그룹1', 4]];
        subs.forEach(s => {
            const lim = limits[s.group] || {};
            rows.push([s.name, s.units, s.category, s.group, lim.name || s.group, lim.max ?? '']);
        });
        const ws = XLSX.utils.aoa_to_sheet(rows);
        ws['!cols'] = [{wch:22},{wch:8},{wch:12},{wch:12},{wch:14},{wch:12}];
        /* 1행(헤더) 배경색 메모 - SheetJS 무료 버전은 스타일 미지원, 주석 처리 */
        XLSX.utils.book_append_sheet(wb, ws, sheetName);
    });

    return wb;
}

/** Excel ArrayBuffer → schoolData 파싱 */
function parseExcel(arrayBuffer) {
    const wb = XLSX.read(new Uint8Array(arrayBuffer), { type:'array' });

    /* 학교명 */
    let schoolName = '우리학교';
    const wsInfo = wb.Sheets['학교정보'];
    if (wsInfo) {
        const rows = XLSX.utils.sheet_to_json(wsInfo, { header:1 });
        for (const r of rows) {
            if (r[0] === '학교명') { schoolName = String(r[1] || schoolName); break; }
        }
    }

    /* 각 학기 */
    const subjects     = {};
    const groupLimits  = {};

    Object.entries(SHEET_SEM).forEach(([sheetName, semKey]) => {
        if (!wb.Sheets[sheetName]) return;
        const rows = XLSX.utils.sheet_to_json(wb.Sheets[sheetName], { header:1 });
        subjects[semKey]    = [];
        groupLimits[semKey] = {};

        for (let i = 1; i < rows.length; i++) {
            const [name, units, category, groupCode, groupName, maxSel] = rows[i];
            if (!name || name === HEADER[0] || String(name).startsWith('(예시)')) continue;
            subjects[semKey].push({
                name:     String(name).trim(),
                units:    Number(units) || 3,
                category: String(category || '탐구').trim(),
                group:    String(groupCode || 'group1').trim()
            });
            const code = String(groupCode || 'group1').trim();
            const max  = Number(maxSel) || 999;
            if (!groupLimits[semKey][code]) {
                groupLimits[semKey][code] = {
                    name: String(groupName || code).trim(),
                    max,
                    desc: max >= 999 ? '자유선택' : `택${max}`
                };
            }
        }
    });

    if (Object.keys(subjects).length === 0)
        throw new Error('학기 데이터를 찾을 수 없습니다. 시트명을 확인하세요.');

    return { schoolName, subjects, groupLimits };
}

    const { coreSubjects, recommendedSubjects } = useMemo(() => {
        if (!selectedMajor || !MAJOR_DATA[selectedMajor]) return { coreSubjects:[], recommendedSubjects:[] };
        return { coreSubjects: MAJOR_DATA[selectedMajor].core, recommendedSubjects: MAJOR_DATA[selectedMajor].recommended };
    }, [selectedMajor]);

    /* 그룹 선택 수 */
    const getGroupCount = (semester, group) => {
        const subs = schoolData.subjects[semester] || [];
        return selectedSubjects.filter(n => subs.some(s => s.name === n && s.group === group)).length;
    };

    /* 학점 통계 */
    const creditStats = useMemo(() => {
        const all  = Object.values(schoolData.subjects).flat();
        const sel  = selectedSubjects.map(n => all.find(s => s.name === n)).filter(Boolean);
        const total = sel.reduce((sum,s) => sum + s.units, 0);
        const byCat = { '기초':0,'탐구':0,'체예술':0,'생활교양':0 };
        sel.forEach(s => {
            if (s.category === '예체능') byCat['체예술'] += s.units;
            else byCat[s.category] = (byCat[s.category] || 0) + s.units;
        });
        return { total, byCat };
    }, [selectedSubjects, schoolData]);

    /* 과목 토글 */
    const toggleSubject = (name, semester) => {
        const sub = (schoolData.subjects[semester] || []).find(s => s.name === name);
        if (!sub) return;
        if (selectedSubjects.includes(name)) {
            setSelected(p => p.filter(s => s !== name));
        } else {
            const cnt   = getGroupCount(semester, sub.group);
            const limit = (schoolData.groupLimits[semester] || {})[sub.group];
            if (limit && cnt >= limit.max) {
                alert(`${semester} ${limit.name}은(는) 최대 ${limit.max}개까지 선택 가능합니다.`);
                return;
            }
            setSelected(p => [...p, name]);
        }
    };

    const isCore        = n => coreSubjects.some(c => n.includes(c) || c.includes(n));
    const isRecommended = n => recommendedSubjects.some(r => n.includes(r) || r.includes(n));

    const getGrouped = (semester) => {
        const subs   = schoolData.subjects[semester] || [];
        const limits = schoolData.groupLimits[semester] || {};
        const grouped = {};
        Object.keys(limits).forEach(k => {
            grouped[k] = { info: limits[k], subjects: subs.filter(s => s.group === k), currentCount: getGroupCount(semester, k) };
        });
        return grouped;
    };

    /* ── Excel 다운로드 ── */
    const downloadExcel = () => {
        const wb = buildExcel(schoolData);
        XLSX.writeFile(wb, `${schoolData.schoolName}_과목양식.xlsx`);
    };

    /* ── Excel 업로드 ── */
    const handleUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
            try {
                const data = parseExcel(ev.target.result);
                setSchoolData(data);
                setSelected([]);
                setMajor('');
                setUploadMsg(`✅ ${data.schoolName} 과목 불러오기 완료`);
            } catch (err) {
                alert('파일 처리 오류: ' + err.message + '\n「📌작성안내」 시트를 참고해주세요.');
            }
        };
        reader.readAsArrayBuffer(file);
        e.target.value = '';
    };

    const semLabel = { '2-1':'2학년 1학기','2-2':'2학년 2학기','3-1':'3학년 1학기','3-2':'3학년 2학기' };
    const semesters = Object.keys(schoolData.subjects);

    return (
        <div className="min-h-screen bg-gray-50">
            {/* 헤더 */}
            <header className="gradient-bg text-white shadow-lg">
                <div className="container mx-auto px-6 py-6">
                    <div className="flex flex-wrap items-center gap-4">
                        <h1 className="text-3xl font-bold">🎓 진로 맞춤형 고교학점제 과목 설계 대시보드</h1>
                        <span style={{fontSize:'0.85rem', fontWeight:'600', opacity:'0.85', background:'rgba(255,255,255,0.18)', borderRadius:'999px', padding:'2px 14px', letterSpacing:'0.03em', whiteSpace:'nowrap'}}>
                            제작자 : 양지고등학교 이재영 선생님
                        </span>
                    </div>
                    <p className="text-purple-100 mt-2">
                        🏫 {schoolData.schoolName} &nbsp;|&nbsp; 2028학년도 주요 대학 권장과목 기반 &nbsp;|&nbsp; 그룹별 선택 제한 적용
                    </p>
                </div>
            </header>

            <div className="container mx-auto px-6 py-8">
                <div className="grid grid-cols-1 lg:grid-cols-4 gap-6">

                    {/* ── 좌측 패널 ── */}
                    <div className="lg:col-span-1 space-y-6">

                        {/* 학교 과목 파일 관리 */}
                        <div className="bg-white rounded-xl shadow-lg p-6">
                            <h2 className="text-xl font-bold text-gray-800 mb-4 flex items-center">
                                <span className="text-2xl mr-2">📂</span>
                                학교 과목 파일
                            </h2>

                            <p className="text-xs text-gray-500 mb-3">
                                엑셀 양식을 내려받아 우리 학교 과목을 입력한 뒤 업로드하세요.
                            </p>

                            {/* 양식 다운로드 */}
                            <button
                                onClick={downloadExcel}
                                className="w-full flex items-center justify-center gap-2 px-4 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-medium text-sm mb-3"
                            >
                                ⬇️ 엑셀 양식 다운로드
                            </button>
                            <p className="text-xs text-gray-400 mb-4 text-center">
                                현재 학교({schoolData.schoolName}) 과목이 채워진 양식이 저장됩니다
                            </p>

                            {/* 파일 업로드 */}
                            <label className="flex flex-col items-center justify-center w-full px-4 py-4 bg-green-50 border-2 border-green-300 border-dashed rounded-lg cursor-pointer hover:bg-green-100 transition-colors">
                                <span className="text-2xl mb-1">📤</span>
                                <span className="text-sm text-green-700 font-medium">수정한 엑셀 파일 업로드</span>
                                <span className="text-xs text-green-500 mt-1">.xlsx 파일만 가능</span>
                                <input type="file" accept=".xlsx,.xls" className="hidden" onChange={handleUpload} />
                            </label>

                            {uploadMsg && (
                                <p className="text-xs text-green-600 mt-2 font-medium text-center">{uploadMsg}</p>
                            )}
                        </div>

                        {/* 진로 탐색기 */}
                        <div className="bg-white rounded-xl shadow-lg p-6">
                            <h2 className="text-xl font-bold text-gray-800 mb-4 flex items-center">
                                <span className="text-2xl mr-2">🎯</span>
                                진로 탐색기
                            </h2>
                            <select
                                value={selectedMajor}
                                onChange={e => setMajor(e.target.value)}
                                className="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-purple-500 focus:outline-none transition-colors text-sm"
                            >
                                <option value="">희망 전공을 선택하세요</option>
                                {MAJOR_GROUPS.map(g => (
                                    <optgroup key={g.label} label={g.label}>
                                        {g.majors.map(m => <option key={m} value={m}>{m}</option>)}
                                    </optgroup>
                                ))}
                            </select>

                            {selectedMajor && (
                                <div className="mt-4 space-y-3">
                                    {coreSubjects.length > 0 && (
                                        <div className="p-4 bg-amber-50 rounded-lg border-2 border-amber-300">
                                            <p className="text-sm font-bold text-amber-900 mb-1">⭐ 핵심 이수과목 ({coreSubjects.length}개)</p>
                                            <p className="text-xs text-amber-700">로드맵에서 <span className="font-bold">금색</span>으로 빛나는 과목</p>
                                            <p className="text-xs text-amber-600 mt-1">{coreSubjects.join(', ')}</p>
                                        </div>
                                    )}
                                    {recommendedSubjects.length > 0 && (
                                        <div className="p-4 bg-purple-50 rounded-lg border-2 border-purple-300">
                                            <p className="text-sm font-bold text-purple-900 mb-1">✨ 권장 이수과목 ({recommendedSubjects.length}개)</p>
                                            <p className="text-xs text-purple-700">로드맵에서 <span className="font-bold">보라색</span>으로 빛나는 과목</p>
                                            <p className="text-xs text-purple-600 mt-1">{recommendedSubjects.join(', ')}</p>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>

                        {/* 이수 현황 */}
                        <div className="bg-white rounded-xl shadow-lg p-6">
                            <h2 className="text-xl font-bold text-gray-800 mb-4 flex items-center">
                                <span className="text-2xl mr-2">📊</span>
                                이수 현황
                            </h2>
                            <div className="mb-6">
                                <div className="flex justify-between items-center mb-2">
                                    <span className="text-sm font-medium text-gray-600">총 이수 학점</span>
                                    <span className="text-2xl font-bold text-purple-600">{creditStats.total}</span>
                                </div>
                                <div className="w-full bg-gray-200 rounded-full h-3">
                                    <div
                                        className="bg-gradient-to-r from-purple-500 to-pink-500 h-3 rounded-full transition-all duration-500"
                                        style={{ width:`${Math.min((creditStats.total/192)*100,100)}%` }}
                                    />
                                </div>
                                <p className="text-xs text-gray-500 mt-1">목표: 192학점</p>
                            </div>
                            <div className="space-y-2">
                                {Object.entries(creditStats.byCat).map(([cat, credits]) => (
                                    <div key={cat} className="flex justify-between items-center p-3 bg-gray-50 rounded-lg">
                                        <span className="text-sm font-medium text-gray-700">{cat}</span>
                                        <span className="text-lg font-bold text-gray-800">{credits}학점</span>
                                    </div>
                                ))}
                            </div>
                            <div className="mt-4 pt-4 border-t border-gray-200 flex justify-between items-center">
                                <span className="text-sm font-medium text-gray-600">선택한 과목</span>
                                <span className="text-lg font-bold text-blue-600">{selectedSubjects.length}개</span>
                            </div>
                        </div>
                    </div>

                    {/* ── 우측: 로드맵 ── */}
                    <div className="lg:col-span-3">
                        <div className="bg-white rounded-xl shadow-lg p-6">
                            <h2 className="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                                <span className="text-2xl mr-2">🗺️</span>
                                2-3학년 통합 로드맵
                            </h2>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                {semesters.map(sem => {
                                    const grouped = getGrouped(sem);
                                    return (
                                        <div key={sem} className="border-2 border-gray-200 rounded-lg p-4">
                                            <h3 className="text-lg font-bold text-gray-700 mb-4 pb-2 border-b-2 border-gray-300">
                                                {semLabel[sem] || sem}
                                            </h3>
                                            {Object.entries(grouped).map(([gk, gd]) => (
                                                <div key={gk} className="mb-4">
                                                    <div className="flex items-center justify-between mb-2 px-2">
                                                        <span className="text-xs font-bold text-gray-600">
                                                            {gd.info.name} ({gd.info.desc})
                                                        </span>
                                                        <span className={`text-xs font-bold ${gd.currentCount >= gd.info.max ? 'text-red-600' : 'text-blue-600'}`}>
                                                            {gd.currentCount}/{gd.info.max >= 999 ? '∞' : gd.info.max}
                                                        </span>
                                                    </div>
                                                    <div className="space-y-2">
                                                        {gd.subjects.map(sub => {
                                                            const isSel  = selectedSubjects.includes(sub.name);
                                                            const isC    = isCore(sub.name);
                                                            const isR    = isRecommended(sub.name);
                                                            return (
                                                                <div
                                                                    key={sub.name}
                                                                    onClick={() => toggleSubject(sub.name, sem)}
                                                                    className={[
                                                                        'p-3 rounded-lg cursor-pointer transition-all duration-300',
                                                                        isSel ? 'bg-blue-500 text-white shadow-lg transform scale-105' : 'bg-white hover:bg-gray-50',
                                                                        isC && !isSel  ? 'border-4 border-amber-400 glow-gold'
                                                                            : isR && !isSel ? 'border-4 border-purple-500 glow-purple'
                                                                            : 'border border-gray-200'
                                                                    ].join(' ')}
                                                                >
                                                                    <div className="flex items-center gap-2 flex-wrap">
                                                                        <span className={`text-sm font-semibold ${isSel ? 'text-white' : 'text-gray-800'}`}>
                                                                            {sub.name}
                                                                        </span>
                                                                        {isC && !isSel && (
                                                                            <span className="text-xs px-2 py-0.5 bg-amber-500 text-white rounded-full font-bold">⭐ 핵심</span>
                                                                        )}
                                                                        {isR && !isC && !isSel && (
                                                                            <span className="text-xs px-2 py-0.5 bg-purple-500 text-white rounded-full font-bold">✨ 권장</span>
                                                                        )}
                                                                        {isSel && (
                                                                            <span className="text-xs px-2 py-0.5 bg-white text-blue-500 rounded-full font-bold">✓ 선택</span>
                                                                        )}
                                                                    </div>
                                                                    <div className="flex gap-2 mt-1">
                                                                        <span className={`text-xs ${isSel ? 'text-blue-100' : 'text-gray-500'}`}>{sub.category}</span>
                                                                        <span className={`text-xs font-medium ${isSel ? 'text-white' : 'text-gray-600'}`}>{sub.units}학점</span>
                                                                    </div>
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    );
                                })}
                            </div>

                            {/* 범례 */}
                            <div className="mt-6 p-4 bg-gray-50 rounded-lg border border-gray-200">
                                <h4 className="text-sm font-bold text-gray-700 mb-3">📌 과목 표시 안내</h4>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-3 text-xs">
                                    <div className="flex items-center gap-2">
                                        <div className="w-4 h-4 bg-amber-400 rounded"></div>
                                        <span><span className="font-bold">금색 테두리</span>: 핵심 이수과목</span>
                                    </div>
                                    <div className="flex items-center gap-2">
                                        <div className="w-4 h-4 bg-purple-500 rounded"></div>
                                        <span><span className="font-bold">보라색 테두리</span>: 권장 이수과목</span>
                                    </div>
                                    <div className="flex items-center gap-2">
                                        <div className="w-4 h-4 bg-blue-500 rounded"></div>
                                        <span><span className="font-bold">파란색 배경</span>: 선택한 과목</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            {/* 푸터 */}
            <footer className="bg-gray-800 text-gray-300 py-6 mt-12">
                <div className="container mx-auto px-6 text-center">
                    <p className="text-sm">
                        💡 핵심·권장과목 데이터: 2028학년도 경희대·고려대·서울대·중앙대·한양대·건국대·부산대 등 주요 대학 권장과목 발표 자료 종합
                    </p>
                    <p className="text-xs mt-2 text-gray-400">
                        대학별 세부 권장과목은 변경될 수 있으니 지원 희망 대학의 입학처 홈페이지를 반드시 확인하시기 바랍니다.
                    </p>
                </div>
            </footer>
        </div>
    );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>



</body>
</html>
